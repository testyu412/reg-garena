<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Garena Reg Tool</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; width: 300px; }
    .panel { padding: 10px; }
    .btn { width: 100%; padding: 8px; margin: 4px 0; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    .btn.red { background: #d50000; color: white; }
    .btn.green { background: #00a859; color: white; }
    .btn.blue { background: #0066cc; color: white; }
    .btn.yellow { background: #ffb300; color: #222; }
    .status { margin: 8px 0; font-size: 14px; font-weight: bold; }
    .meter { background: #f0f0f0; padding: 8px; border-radius: 6px; }
    .log { height: 120px; overflow-y: auto; background: #111; color: #e6e6e6; font-size: 11px; padding: 6px; border-radius: 4px; }
    .row { display: flex; gap: 4px; margin-top: 4px; }
    .row .half { flex: 1; }
  </style>
</head>
<body>
  <div class="panel">
    <div class="row"><button id="start" class="btn green">▶ Bắt Đầu</button></div>
    <div class="row"><button id="stop" class="btn red">■ Dừng Lại</button></div>
    <div class="row"><button id="status" class="btn blue">🔎 Xem trạng thái</button></div>
    <div class="row"><button id="clear" class="btn yellow">🧹 Xóa dữ liệu</button></div>
    <div class="row"><input id="count" class="btn" style="width:100%; padding:8px;" value="5"/></div>
    <div class="status">Trạng thái: <span id="state">idle</span></div>
    <div class="meter">Thành công: <span id="success">0</span>  Thất bại: <span id="fail">0</span></div>
    <div class="row"><button id="test" class="btn blue">🧪 Test generate</button></div>
    <div class="row"><button id="download" class="btn green">📄 Tải file acc.txt</button></div>
    <div class="log" id="log">Log...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
